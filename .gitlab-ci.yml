# ============================================
# GitLab CI/CD - Frontend (React + Vitest)
# ============================================

stages:
  - install
  - lint
  - test
  - build
  - deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .pnpm-store/
    - node_modules/

variables:
  NODE_ENV: test
  PNPM_HOME: "/root/.local/share/pnpm"

# Template commun à tous les jobs
.default_node_job: &default_node_job
  image: node:22-alpine
  before_script:
    - corepack enable
    - corepack install
    - pnpm install --frozen-lockfile

# ──────────────── INSTALL ────────────────
install-dependencies:
  <<: *default_node_job
  stage: install
  script:
    - echo "📦 Dépendances installées via before_script"
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# ──────────────── LINT ────────────────
lint:
  <<: *default_node_job
  stage: lint
  needs: [install-dependencies]
  script:
    - echo "🔍 Vérification ESLint..."
    - pnpm run lint
  allow_failure: false

# ──────────────── TEST ────────────────
test:vitest:
  <<: *default_node_job
  stage: test
  needs: [install-dependencies]
  script:
    - echo "🧪 Exécution des tests unitaires..."
    - pnpm run test:coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    expire_in: 7 days
  only:
    - merge_requests
    - main
    - develop

# ──────────────── BUILD ────────────────
build:
  <<: *default_node_job
  stage: build
  needs: [test:vitest]
  script:
    - echo "🏗️ Build de production..."
    - pnpm run build
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  only:
    - main
    - develop

# ──────────────── DEPLOY ────────────────
pages:
  <<: *default_node_job
  stage: deploy
  needs: [build]
  script:
    - echo "🚀 Déploiement GitLab Pages..."
    - mkdir -p public
    - cp -r dist/* public/
    - mkdir -p public/coverage
    - cp -r coverage/lcov-report/* public/coverage/ 2>/dev/null || true
  artifacts:
    paths:
      - public
    expire_in: 30 days
  only:
    - main
  environment:
    name: production
    url: https://$CI_PROJECT_PATH_SLUG.gitlab.io/$CI_PROJECT_NAME/